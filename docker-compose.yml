services:
  mysql:
    image: mysql:8.4
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_biblioteca
      MYSQL_USER: dev
      MYSQL_PASSWORD: minhasenha
    ports:
      - "33060:3306"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_laravel
    restart: always
    working_dir: /app
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file: ".env"
    volumes:
      - .:/app
    depends_on:
      - mysql
    entrypoint: /app/docker-entrypoint.sh

volumes:
  mysql_data:

